name: build-products-manifest

on:
  push:
    branches: [main]
    paths:
      - 'products/**'
      - 'scripts/build-products-manifest.mjs'
      - '.github/workflows/build-products-manifest.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-products-manifest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install js-yaml
        run: npm install --no-save --silent js-yaml@4

      - name: Build manifest
        run: node scripts/build-products-manifest.mjs

      - name: Commit manifest if changed
        run: |
          if [ -n "$(git status --porcelain data/products.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/products.json
            git commit -m "data/products.json: ürün manifesti güncellendi [skip ci]"
            git push
          else
            echo "manifest is up to date"
          fi
